<script>
const slots=[
  {title:"Welcome Series", image:"images/welcome1.jpg", sl:"Welcome to Satya Jewelry ✨ Save 10% today", ph:"Shop meaningful jewelry that gives back"},
  {title:"Welcome Series", image:"images/welcome2.jpg", sl:"Discover your sacred symbol ✨ plus 10% off your first order", ph:"Take our Symbol Quiz and find the jewelry meant for your journey"},
  {title:"Welcome Series", image:"images/welcome3.jpg", sl:"Tell your story + take 15% off your first order", ph:"Discover our Sacred Charm collection ✨"},
  {title:"Welcome Series", image:"images/welcome-existing.jpg", sl:"Confirmed: You're part of the Satya Jewelry community", ph:"Stay inspired with SMS, loyalty rewards, and new ways to explore Satya Jewelry"},
  {title:"Date-Based - Birthday", image:"images/date1.jpg", sl:"Celebrate your special day with Satya Jewelry", ph:"Share your date of birth in our Preference Center to receive a birthday surprise."},
  {title:"Date-Based - Birthday", image:"images/date2.jpg", sl:"Celebrate your journey with 20% off", ph:"A special gift from Satya Jewelry—20% off to honor your truth and your light."},
  {title:"Page Browse Abandonment", image:"images/ba-page.jpg", sl:"Still thinking about something special?", ph:"Your journey with Satya starts here—your favorites are waiting ✨"},
  {title:"Product Browse Abandonment", image:"images/ba-prod1.jpg", sl:"Something special is calling to you", ph:"The piece you discovered is waiting to inspire your journey"},
  {title:"Product Browse Abandonment", image:"images/ba-prod2.jpg", sl:"Don't let this piece slip away", ph:"The design you loved is still waiting—make it yours today"},
  {title:"Back In Stock Alert", image:"images/bis.jpg", sl:" It's Back: Your favorite Satya Jewelry style has returned ✨", ph:"The piece you've been waiting for is finally back in stock—shop now!"},
  {title:"Low Inventory Alert", image:"images/li-alert.jpg", sl:"Almost Gone: [[Title]] won't last long", ph:"We're nearly sold out—claim yours before it disappears"},
  {title:"Price Drop Alert", image:"images/pd-alert.jpg", sl:"Your favorite piece was just marked down", ph:"A little gift from the Universe - shop now!"},
  {title:"Post Purchase Thank You", image:"images/pps-thank-you.jpg", sl:"With gratitude, from Satya 🙏", ph:" Your support empowers us to keep creating with meaning and intention"},
  {title:"Post Purchase Winback", image:"images/pps-winback.jpg", sl:"We've missed you--enjoy 20% off your next purchase now", ph:"Reconnect with Satya Jewelry today"},
  {title:"Recurring Automated Campaign", image:"images/rac.jpg", sl:"Discover jewelry aligned with your journey", ph:"Handcrafted pieces, designed with meaning—just for you"},
  {title:"Shopping Cart Abandonment", image:"images/sca1.jpg", sl:"Feeling inspired? Your cart is waiting", ph:"Your picks are saved — ready when you are"},
  {title:"Shopping Cart Abandonment", image:"images/sca2.jpg", sl:"Your picks are waiting — ready when you are", ph:"Manifestation is just a click away ✨"},
  {title:"Shopping Cart Abandonment", image:"images/sca3.jpg", sl:"A little gift for your journey - 10% off!", ph:"Your meaningful pieces are waiting"},
  {title:"Transactional", image:"images/tran-order-confirmed.jpg", sl:"Thank you for your order", ph:"Get ready to be inspired"},
  {title:"Transactional", image:"images/tran-order-delivered.jpg", sl:"Order # xxxxxxxxxx has been delivered", ph:"It's arrived!"},
  {title:"Transactional", image:"images/tran-order-refunded.jpg", sl:"Your order has been refunded", ph:"Let us know if we can be of further assistance!"},
  {title:"Transactional", image:"images/tran-shipping-confirm.jpg", sl:"Order # xxxxxxx has shipped", ph:"Your jewelry is on its way!"}
];

const images=[]; // populated as cards are built
const grid=document.getElementById('gallery-grid');
slots.forEach((lbl,i)=>{
  const card=document.createElement('div');
  card.className='g-card';
  card.innerHTML=`
    <div class="g-placeholder">
    
      <div class="lbl"><img src="${lbl.image}" alt="${lbl.title}"></div>
    </div>
    <div class="g-overlay">
      <div class="g-overlay-title">${lbl.title}</div>
    </div>
    <div class="g-caption">
        ${lbl.title}<br>
        SL: ${lbl.sl}<br>
        PH: ${lbl.ph}
    </div>`;
  card.addEventListener('click',()=>openLightbox(i));
  images.push({src:lbl.image,caption:lbl.title});
  grid.appendChild(card);
});


let current=0;

function openLightbox(i){
  current=i;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow='';
  resetZoom();
}

function shiftLightbox(dir){
  current=(current+dir+images.length)%images.length;
  updateLightbox();
  resetZoom();
}

function updateLightbox(){
  const img=document.getElementById('lb-img');
  const cap=document.getElementById('lb-caption');
  const d=images[current];
  img.src=d.src||'';
  img.style.display=d.src?'block':'none';
  cap.textContent=`${String(current+1).padStart(2,'0')} / ${String(images.length).padStart(2,'0')} — ${d.caption}`;
}

function toggleZoom(){
  const wrap=document.getElementById('lb-wrap');
  const img=document.getElementById('lb-img');
  const hint=document.getElementById('lb-hint');
  const zoomed=img.classList.toggle('zoomed');
  wrap.classList.toggle('zoomed',zoomed);
  hint.textContent=zoomed?'Click image to zoom out':'Click image to zoom in';
}

function resetZoom(){
  const img=document.getElementById('lb-img');
  const wrap=document.getElementById('lb-wrap');
  img.classList.remove('zoomed');
  wrap.classList.remove('zoomed');
  document.getElementById('lb-hint').textContent='Click image to zoom in';
}

// Close on backdrop click
document.getElementById('lightbox').addEventListener('click',function(e){
  if(e.target===this) closeLightbox();
});

// Keyboard navigation
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('active')) return;
  if(e.key==='ArrowRight') shiftLightbox(1);
  if(e.key==='ArrowLeft') shiftLightbox(-1);
  if(e.key==='Escape') closeLightbox();
});

</script>
